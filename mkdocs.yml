site_name: GEMINI Documentation

nav:
  - Start Guide:
      - Overview: start_guide/index.md
      - User Guide: start_guide/user_guide.md
      - Developer Guide: start_guide/developer_guide.md
  - App Guide:
      - Overview: app_guide/index.md
      - Upload: app_guide/upload.md
      - Aerial Pipeline: app_guide/aerial_pipeline.md
      - Ground Pipeline: app_guide/ground_pipeline.md
      - Analyze: app_guide/analyze.md
      - Dashboard: app_guide/dashboard.md
  - Hardware:
      - Overview: hardware/index.md
      - Amiga: hardware/Amiga/1- AmigaQSG.md
      - Drone: hardware/Drone/3 - Drone SOP.md
      - Weather Station: hardware/Weather Station/1- Weather Station Build.md

theme: 
  name: material
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
    - navigation.indexes
  font:
    text: Poppins
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue grey
      accent: custom
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: blue grey
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  favicon: assets/gemini_small_logo.png
  logo: assets/gemini_logo.png

plugins:
  - search
  - glightbox
  - mkdocs-pdf


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.blocks.tab:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - attr_list
  - md_in_html
extra_css:
  - stylesheets/extra.css
